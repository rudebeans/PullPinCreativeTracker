<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PullPin Pulse</title>
  <meta name="description" content="Less management. More momentum. A lightweight project tracker for creative teams." />
  <link rel="icon" type="image/png" href="favicon.png" />
  <!-- set theme before paint (dark is the default) — avoids a flash -->
  <script>(function(){try{var t=localStorage.getItem('pp-theme');document.documentElement.setAttribute('data-theme',t==='light'?'light':'dark');}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
  <link rel="stylesheet" href="styles.css?v=11" />
</head>
<body>
  <!-- Living gradient: slow-drifting blurred color blobs. Lives outside #app
       so the app's re-renders never disturb it. -->
  <div class="bg" aria-hidden="true">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
    <span class="blob b4"></span>
    <span class="blob b5"></span>
  </div>

  <div id="app"></div>

  <!-- Plain (non-module) scripts so the app runs by double-clicking index.html
       — no build step, no local server, no CORS headaches. -->
  <!-- Optional team sync: Supabase client + your config. Empty config.js keeps
       it single-player; filled keys turn on shared "team memory". -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js?v=1"></script>
  <script src="data.js?v=6"></script>
  <script src="sync.js?v=4"></script>
  <script src="auth.js?v=3"></script>
  <script src="app.js?v=12"></script>
</body>
</html>
